<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Vibe — Connect, share, and discover. A premium social media experience.">
  <meta name="theme-color" content="#0a0a0f">
  <title>Vibe — Connect &amp; Share</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='80' font-size='80'>✦</text></svg>">
</head>
<body>

  <div class="auth-page">
    <!-- Left: Animated Brand Panel -->
    <div class="auth-left">
      <div class="floating-shape floating-shape--1"></div>
      <div class="floating-shape floating-shape--2"></div>
      <div class="floating-shape floating-shape--3"></div>
      <div class="floating-shape floating-shape--4"></div>
      <div class="auth-brand">
        <h1 class="auth-brand-name">Vibe</h1>
        <p class="auth-brand-tagline">Connect with the world. Share your story. Discover what matters.</p>
      </div>
    </div>

    <!-- Right: Auth Forms -->
    <div class="auth-right">
      <div class="auth-form-container">

        <!-- Login Form -->
        <div class="auth-form active" id="login-form">
          <h2 class="auth-form-title">Welcome back</h2>
          <p class="auth-form-subtitle">Sign in to your account</p>
          <form id="login-submit-form">
            <div class="form-group">
              <label for="login-email">Email</label>
              <input type="email" id="login-email" class="input-field" placeholder="you@example.com" required autocomplete="email">
              <div class="form-error" id="login-email-error"></div>
            </div>
            <div class="form-group">
              <label for="login-password">Password</label>
              <input type="password" id="login-password" class="input-field" placeholder="••••••••" required autocomplete="current-password">
              <div class="form-error" id="login-password-error"></div>
            </div>
            <button type="submit" class="btn btn-primary btn-block btn-lg" id="login-btn">Sign In</button>
          </form>
          <div class="auth-switch">
            Don't have an account? <a id="show-register">Sign up</a>
          </div>
        </div>

        <!-- Register Form -->
        <div class="auth-form" id="register-form">
          <h2 class="auth-form-title">Create account</h2>
          <p class="auth-form-subtitle">Join the Vibe community</p>
          <form id="register-submit-form">
            <div class="form-group">
              <label for="reg-username">Username</label>
              <input type="text" id="reg-username" class="input-field" placeholder="johndoe" required autocomplete="username">
              <div class="form-error" id="reg-username-error"></div>
            </div>
            <div class="form-group">
              <label for="reg-email">Email</label>
              <input type="email" id="reg-email" class="input-field" placeholder="you@example.com" required autocomplete="email">
              <div class="form-error" id="reg-email-error"></div>
            </div>
            <div class="form-group">
              <label for="reg-display-name">Display Name</label>
              <input type="text" id="reg-display-name" class="input-field" placeholder="John Doe" required>
              <div class="form-error" id="reg-display-name-error"></div>
            </div>
            <div class="form-group">
              <label for="reg-password">Password</label>
              <input type="password" id="reg-password" class="input-field" placeholder="Min 6 characters" required autocomplete="new-password">
              <div class="form-error" id="reg-password-error"></div>
            </div>
            <button type="submit" class="btn btn-primary btn-block btn-lg" id="register-btn">Create Account</button>
          </form>
          <div class="auth-switch">
            Already have an account? <a id="show-login">Sign in</a>
          </div>
        </div>

      </div>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
</body>
</html>
